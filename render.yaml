services:
  - type: web
    name: visit-addis-ababa-registration
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: visit-addis-ababa-db
          property: connectionString
      - key: ADMIN_PASSWORD
        generateValue: true

databases:
  - name: visit-addis-ababa-db
    databaseName: registrations
    user: registrations_user
    plan: free
